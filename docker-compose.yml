version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stellarguard
      POSTGRES_PASSWORD: stellarguard
      POSTGRES_DB: stellarguard_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://stellarguard:stellarguard@postgres:5432/stellarguard_db
      REDIS_URL: redis://redis:6379
    ports: ["5000:5000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["3000:80"]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  postgres_data:
